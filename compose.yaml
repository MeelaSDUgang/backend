services:
  compliancedashboard:
    image: compliancedashboard
    restart: on-failure
    build:
      context: .
      dockerfile: src/ComplianceDashboard/Dockerfile
    depends_on:
      dashboard-postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: Host=dashboard-postgres;Port=5432;Database=dashboard;Username=postgres;Password=postgres
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "3001:8080"

  dashboard-postgres:
    image: postgres:16-alpine
    container_name: dashboard-postgres
    environment:
      POSTGRES_DB: dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dashboard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d dashboard" ]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-postgres:
    image: postgres:16-alpine
    container_name: payment-postgres
    environment:
      POSTGRES_DB: payment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - payment-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  dashboard-postgres-data:
  payment-postgres-data:
