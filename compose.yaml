services:
  compliancedashboard:
    image: compliancedashboard
    restart: on-failure
    build:
      context: .
      dockerfile: src/ComplianceDashboard/Dockerfile
    depends_on:
      dashboard-postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: Host=dashboard-postgres;Port=5432;Database=dashboard;Username=postgres;Password=postgres
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "3001:8080"
  
  gatewayapi:
    image: gatewayapi
    build:
      context: .
      dockerfile: src/GatewayApi/Dockerfile
    depends_on:
      dashboard-postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: Host=dashboard-postgres;Port=5432;Database=dashboard;Username=postgres;Password=postgres
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "3002:8080"

  dashboard-postgres:
    image: postgres:16-alpine
    container_name: dashboard-postgres
    environment:
      POSTGRES_DB: dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dashboard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d dashboard" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dashboard-postgres-data:
  payment-postgres-data:
